name: Build New API for Katabump GLIBC 2.31

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container: ubuntu:20.04

    steps:
      - name: Install base tools
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git curl ca-certificates xz-utils unzip \
            build-essential gcc g++ make \
            libsqlite3-dev binutils

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        run: |
          curl -fsSL https://go.dev/dl/go1.22.12.linux-amd64.tar.gz -o /tmp/go.tar.gz
          tar -C /usr/local -xzf /tmp/go.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          /usr/local/go/bin/go version

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Build web/default
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          cd web/default
          bun install
          bun run build
          cd ../..
          test -f web/default/dist/index.html

      - name: Build web/classic
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          cd web/classic
          bun install
          bun run build
          cd ../..
          test -f web/classic/dist/index.html

      - name: Check dist files
        run: |
          ls -la web/default/dist
          ls -la web/classic/dist

      - name: Build backend
        run: |
          export PATH="/usr/local/go/bin:$PATH"
          go mod download
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o new-api

      - name: Check binary
        run: |
          file new-api
          readelf -V new-api | grep GLIBC_ || true
          chmod +x new-api
          ./new-api --help || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-katabump-glibc231
          path: new-api
